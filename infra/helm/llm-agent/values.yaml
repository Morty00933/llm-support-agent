# ==============================================================================
# LLM Support Agent - Helm Values
# ==============================================================================
# Minikube-friendly defaults (1 replica each, modest resources)

# ------------------------------------------------------------------------------
# Backend (FastAPI)
# ------------------------------------------------------------------------------
backend:
  replicaCount: 1
  image:
    repository: llm-support-agent-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ------------------------------------------------------------------------------
# Frontend (Vite/React served by nginx in production)
# ------------------------------------------------------------------------------
frontend:
  replicaCount: 1
  image:
    repository: llm-support-agent-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ------------------------------------------------------------------------------
# PostgreSQL (pgvector)
# ------------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

# ------------------------------------------------------------------------------
# Database credentials (stored in Secret)
# ------------------------------------------------------------------------------
database:
  user: postgres
  password: postgres
  name: llm_agent
  poolSize: "10"
  maxOverflow: "20"

# ------------------------------------------------------------------------------
# Application configuration (stored in ConfigMap)
# ------------------------------------------------------------------------------
config:
  env: production
  debug: "false"
  appName: llm-support-agent
  logLevel: INFO
  logFormat: json
  corsOrigins: "http://localhost:3000,http://localhost:5173"
  prometheusEnabled: "true"
  demoModeEnabled: "false"
  demoSeedOnStartup: "false"
  ollamaBaseUrl: "http://ollama:11434"
  ollamaModelChat: "qwen2.5:3b"
  ollamaModelEmbed: "nomic-embed-text"
  ollamaTimeout: "120"
  ollamaTemperature: "0.2"

# ------------------------------------------------------------------------------
# Secrets (sensitive values - override in production)
# ------------------------------------------------------------------------------
secrets:
  jwtSecret: "CHANGE_ME_IN_PRODUCTION_use_openssl_rand_hex_32"
  jwtAlgorithm: "HS256"
  jwtExpireMinutes: "60"
  # Placeholder API keys - override via --set or external secret manager
  openaiApiKey: ""
  anthropicApiKey: ""

# ------------------------------------------------------------------------------
# Migration Job (Alembic)
# ------------------------------------------------------------------------------
migration:
  enabled: true
  backoffLimit: 3

# -- External infrastructure hosts (for hybrid mode)
infra:
  external: false
  postgresHost: ""
  ollamaHost: ""
