apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: llm-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  # Database credentials
  DB_USER: {{ .Values.database.user | b64enc | quote }}
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
  DB_NAME: {{ .Values.database.name | b64enc | quote }}

  # JWT configuration
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  JWT_ALG: {{ .Values.secrets.jwtAlgorithm | b64enc | quote }}
  JWT_EXPIRE_MIN: {{ .Values.secrets.jwtExpireMinutes | b64enc | quote }}

  # API keys (placeholders - override in production)
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
